name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go vet ./...
      - run: go test -race -timeout 60s ./...
      - run: go test -bench="BenchmarkFEC|BenchmarkCongestion|BenchmarkAES|BenchmarkChaCha" -benchmem -benchtime=1s -run=^$ ./...
